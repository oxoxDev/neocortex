identity:
  name: save_memory
  author: Neocortex
  label:
    en_US: Save Memory
description:
  human:
    en_US: Save or update a single memory in Neocortex. Use this when you learn a fact (e.g. user preference, context) that should persist.
  llm:
    en_US: Save or update a single memory in Neocortex. 
parameters:
  - name: key
    type: string
    required: true
    label:
      en_US: Memory Key
    human_description:
      en_US: Unique identifier for this memory.
    llm_description:
      en_US: Unique identifier for this memory.
  - name: content
    type: string
    required: true
    label:
      en_US: Memory Content
    human_description:
      en_US: The memory content to store.
    llm_description:
      en_US: The memory content to store.
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
    human_description:
      en_US: Scope for organizing memories. Falls back to default.
    llm_description:
      en_US: Scope for organizing memories.
  - name: metadata_json
    type: string
    required: false
    label:
      en_US: Metadata (JSON)
    human_description:
      en_US: JSON-encoded key-value dictionary for metadata.
    llm_description:
      en_US: JSON-encoded key-value dictionary for metadata.
