identity:
  name: recall_memory
  author: Neocortex
  label:
    en_US: Recall Memory
description:
  human:
    en_US: Recall relevant memories from Neocortex for a given question or topic. Use this to look up past facts before answering.
  llm:
    en_US: Recall relevant memories from Neocortex for a given question or topic.
parameters:
  - name: prompt
    type: string
    required: true
    label:
      en_US: Prompt
    human_description:
      en_US: Natural-language query describing what you need.
    llm_description:
      en_US: Natural-language query describing what you need.
  - name: namespace
    type: string
    required: false
    label:
      en_US: Namespace
    human_description:
      en_US: The namespace to search in. Falls back to default.
    llm_description:
      en_US: The namespace to search in.
  - name: num_chunks
    type: number
    required: false
    label:
      en_US: Max Chunks
    human_description:
      en_US: Maximum number of memory chunks to retrieve. Defaults to 10.
    llm_description:
      en_US: Maximum number of memory chunks to retrieve.
